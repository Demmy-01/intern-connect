<html lang="en">
  <head>

  <body>
    <div class="section-1 animate__animated animate__backInRight">
      <div class="login-container animate__animated animate__backInRight">
        <h1>Welcome to Intern Connect</h1>
        <br>
        <h2>Sign Up</h2>
        <form>
            <input type="name" placeholder="Full Name" name="fullname" required>
            <input type="email" placeholder="Email" name="email" required>
            <button type="button" id="nextButton"> Next
            </button>
        </form>
        <p>Already have an account? <a href="signup-1.html">Login</a></p>
    </div>
    </div>

   <div class="section-2">
    <p>© 2024 Intern connect</p>
   </div>

   <script>
    document.getElementById('nextButton').addEventListener('click', function() {
        window.location.href = 'signup-3.html';
    });
</script>
