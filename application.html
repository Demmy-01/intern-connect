        <div class="container">
            <div class="header">
             <img alt="QuicKee logo" height="50" src="./images/Rectangle 51.png" width="50"/>
             <h1>
              <b>Apply to QuicKee.</b>
             </h1>
            </div>
            <form>
             <div class="form-group">
              <label for="fullName">
               Personal Details:
              </label>
              <input class="form-control" id="fullName" placeholder="Full Name" type="text" required/>
             </div>
             <div class="form-group">
                <label for="date" class="dob">Date of Birth</label>
              <input type="date" class="form-control" id="dob" placeholder="Date of Birth dd/mm/yy" required/>
             </div>
             <div class="form-group">
              <select class="form-control" id="gender">
               <option value="" disabled selected>
                Gender
               </option>
               <option value="male">Male</option>
               <option value="female">Female</option>
               <option value="prefer not to mention">Prefer not to mention</option>
              </select>
             </div>
             <div class="form-group">
              <input class="form-control" id="email" placeholder="Email" type="email" required/>
             </div>
             <div class="form-group">
              <input class="form-control" id="address" placeholder="Address" type="text" required/>
             </div>
             <div class="form-group">
              <label for="institutionName">
               Educational Background:
              </label>
              <input class="form-control" id="institutionName" placeholder="Institution Name" type="text" required/>
             </div>
             <div class="form-group">
              <input class="form-control" id="courseOfStudy" placeholder="Course Of study" type="text" required/>
             </div>
             <div class="form-group">
              <input class="form-control" id="yearOfStudy" placeholder="Year of study" type="text" required/>
             </div>
             <div class="form-group">
              <input class="form-control" id="expectedGraduationYear" placeholder="Expected Graduation Year" type="text" required/>
             </div>
             <div class="form-group">
              <label for="startDate">
               Internship Details:
              </label>
              <br>
              <label for="date" class="dob">Start Date</label>
              <input class="form-control" placeholder="Start Date" class="form-control" id="dob" type="date" required/>
              <label for="date" class="dob">End Date</label>
              <input class="form-control" placeholder="Start Date" class="form-control" id="dob" type="date" required/>
             </div>
             <div class="form-group">
              <input class="form-control" id="duration" placeholder="Duration" type="text" required/>
             </div>
             <div class="form-group">
              <label for="uploadDocuments">
               Upload Documents:
              </label>
              <div class="d-flex justify-content-between">
               <div class="upload-btn">
                <i class="fas fa-file-upload">
                </i>
                Upload CV/Resume
               </div>
               <div class="upload-btn right-upload">
                <i class="fas fa-file-upload">
                </i>
                Upload CV/Resume
               </div>
              </div>
             </div>
             <div class="form-group text-end">
                   <button class="btn-1" type="submit">Next</button>
             </div>
            </form>
